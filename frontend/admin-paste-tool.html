<!DOCTYPE html>
<html>
<head>
  <title>School Signal Admin</title>
</head>

<body>

<h2>School Signal Admin Paste Tool</h2>

<label>School Name</label>
<br>
<input type="text" id="school" placeholder="Enter school name">
<br><br>

<label>Date</label>
<br>
<input type="date" id="date">
<br><br>

<label>Source</label>
<br>
<select id="source">
  <option>School Website</option>
  <option>Parent Report</option>
  <option>Forum</option>
</select>

<br><br>

<label>Paste Update</label>
<br>
<textarea id="update" rows="6" cols="60"></textarea>

<br><br>

<button onclick="processUpdate()">Process Update</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://qpcsjweadyhhwfbizlvm.supabase.co";

const SUPABASE_KEY = "sb_publishable_UZLYBFAHRFl-aIvQqY5JyQ_DumhuL98";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);


async function processUpdate(){

  const school = document.getElementById("school").value;
  const date = document.getElementById("date").value;
  const source = document.getElementById("source").value;
  const update = document.getElementById("update").value;

  if(!school || !date){
    alert("Please enter school and date");
    return;
  }

  const rankMatch = update.match(/\d+/);
  const rank = rankMatch ? parseInt(rankMatch[0]) : null;

  const { data: schoolRow } = await supabase
    .from("schools")
    .select("id")
    .eq("name", school)
    .single();

  if(!schoolRow){
    alert("School not found in database");
    return;
  }

  const school_id = schoolRow.id;

  const { error } = await supabase
    .from("waiting_list_updates")
    .insert([
      {
        school_id: school_id,
        rank_position: rank,
        update_date: date,
        source: source,
        confidence_score: 0.8,
        notes: update
      }
    ]);

  if(error){
    console.error(error);
    alert("Error saving update");
  } else {
    alert("Update saved successfully");
  }

}

</script>

</body>
</html>
